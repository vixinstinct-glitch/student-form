<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生報到系統</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #00b900; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #009900; }
    </style>
</head>
<body>
    <div class="card">
        <h2>學生報到</h2>
        <p>請輸入您的電話號碼</p>
        <input type="tel" id="phone" placeholder="例如：0912345678">
        <button onclick="submitForm()">確認報到</button>
        <p id="status" style="margin-top:10px; font-size:14px; color:gray;"></p>
    </div>

    <script>
        async function submitForm() {
            const phone = document.getElementById('phone').value;
            const status = document.getElementById('status');
            
            if (!phone) { alert('請輸入電話！'); return; }

            status.innerText = '傳送中...';

            try {
                // !!! 這裡要換成你 n8n 的 Webhook URL !!!
                const webhookUrl = '你的_N8N_WEBHOOK_URL'; 

                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phoneNumber: phone,
                        timestamp: new Date().toLocaleString()
                    })
                });

                if (response.ok) {
                    status.style.color = 'green';
                    status.innerText = '報到成功！感謝您的參與。';
                    document.getElementById('phone').value = '';
                } else {
                    throw new Error();
                }
            } catch (error) {
                status.style.color = 'red';
                status.innerText = '連線失敗，請稍後再試。';
            }
        }
    </script>
</body>
</html>
